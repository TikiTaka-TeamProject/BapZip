spring:
  profiles:
    active: db
  web:
    resources:
      add-mappings: false


  datasource:
    url: ${DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
#      ddl-auto: create-drop #테스트용
      ddl-auto: update #테스트용
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
payment:
  toss:
    client:
      key: ${PAYMENT_CLIENT_KEY}
    secret:
      key: ${PAYMENT_SECRET_KEY}
    success-url: http://localhost:${server.port}/payments/success
    fail-url: http://localhost:${server.port}/payments/fail

