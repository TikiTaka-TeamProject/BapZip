spring:
  config:
    import:
      - optional:classpath:secrets.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: testuser
    password: testpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  web:
    resources:
      add-mappings: false

payment:
  toss:
    client:
      key: ${PAYMENT_CLIENT_KEY}
    secret:
      key: ${PAYMENT_SECRET_KEY}
    success-url: http://localhost:8080/payments/success
    fail-url: http://localhost:8080/payments/fail

jwt:
  secret:
    key: ${JWT_SECRET_KEY}

kakao:
  rest:
    api:
      key: ${KAKAO_REST_API_KEY}

google:
  api:
    key: ${GOOGLEAI_API_KEY}

# Swagger 비활성화
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false