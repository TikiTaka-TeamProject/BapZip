spring:
  config:
    import:
      - optional:classpath:secrets.yml

  datasource:
    url: jdbc:postgresql://localhost:5432/testdb
    username: testuser
    password: testpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  web:
    resources:
      add-mappings: false

payment:
  toss:
    client:
      key: test_ck_dummy_key_for_testing
    secret:
      key: test_sk_dummy_key_for_testing
    success-url: http://localhost:8080/payments/success
    fail-url: http://localhost:8080/payments/fail

jwt:
  secret:
    key: dGVzdF9qd3Rfc2VjcmV0X2tleV9mb3JfdGVzdGluZ19wdXJwb3Nl

kakao:
  rest:
    api:
      key: test_kakao_rest_api_key_dummy

google:
  api:
    key: test_google_api_key_dummy

# Swagger 비활성화
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false