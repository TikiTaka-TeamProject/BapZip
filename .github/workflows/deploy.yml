name: CI/CD 파이프라인

on:
  pull_request:
    branches: ["dev"]
  push:
    branches: ["dev"]

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: gradle 캐시 삭제
        run: ./gradlew clean --no-build-cache

      - name: 테스트 진행
        run: ./gradlew test -Dspring.profiles.active=test

      - name: 테스트 결과 요약 및 시각화
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: build/test-results/**/*.xml

  build-and-push:
    name: 도커 이미지 빌드 및 푸시
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && success()

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      - name: gradle로 테스트 하지않고 빌드
        run: ./gradlew bootJar -Dspring.profiles.active=prod -x test

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            jaew0n/bapzip:${{ github.sha }}
            jaew0n/bapzip:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: EC2에 배포
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: EC2로 SSH 접속 후 배포 실행
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }} | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin
            
            echo "기존 컨테이너 중지 및 삭제"
            docker stop bapzip || true
            docker rm bapzip || true
            
            echo "최신 이미지 pull"
            docker pull jaew0n/bapzip:latest
            
            echo "새 컨테이너 실행"
            docker run -d \
              --name bapzip \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e PAYMENT_CLIENT_KEY=${{ secrets.PAYMENT_CLIENT_KEY }} \
              -e PAYMENT_SECRET_KEY=${{ secrets.PAYMENT_SECRET_KEY }} \
              -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
              -e KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }} \
              -e GOOGLEAI_API_KEY=${{ secrets.GOOGLEAI_API_KEY }} \
              --restart unless-stopped \
              jaew0n/bapzip:latest
            
            echo "이전 이미지 정리"
            docker image prune -af
            
            echo "배포 성공"